<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sushi Scan Desktop</title>
        <link rel="stylesheet" href="./css/index.css">
        <script src="./js/index.js"></script>
    </head>
    <body>
        <div class="topBar">
            <div class="logo">
                <img src="./img/logo.png" alt="Sushi Scan Logo">
            </div>
            <div class="title">Sushi Scan Desktop</div>
            <div class="version">v1.0.8</div>
            <div class="buttons">
                <button class="minimize" onclick="minimizeWindow()">-</button>
                <button class="close" onclick="closeWindow()">X</button>
            </div> </div> <div class="section search-section">
            <div class="searchBar">
                <input type="text" id="searchInput"
                    placeholder="Search for scans...">
                <button id="searchButton">Search</button>
            </div>
        </div>

        <!-- Trending Section -->
        <div class="section">
            <h2 class="section-title">🔥 Trending</h2>
            <div class="scanList" id="trendingList">
                <!-- Trending cards will be dynamically added here -->
            </div>
        </div>

        <!-- Popular Section -->
        <div class="section">
            <h2 class="section-title">⭐ Popular</h2>
            <div class="scanList" id="popularList">
                <!-- Popular cards will be dynamically added here -->
            </div>
        </div> <!-- Recommended Section -->
        <div class="section">
            <h2 class="section-title">💎 Recommended</h2>
            <div class="scanList" id="recommendedList">
                <!-- Recommended cards will be dynamically added here -->
            </div>
        </div>

        <!-- Manga Details Section -->
        <div class="manga-details" id="mangaDetails">
            <!-- Manga details will be dynamically added here -->
        </div>

        <!-- Chapter Viewer Section -->
        <div class="chapter-viewer" id="chapterViewer">
            <!-- Chapter pages will be dynamically added here -->
        </div>
    </body>
</html>
