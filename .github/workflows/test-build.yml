name: 🧪 Test Build

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  # 🔍 Test Windows Build
  test-windows:
    name: 🔍 Test Windows Build
    runs-on: windows-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📦 Install Dependencies
        run: npm ci
        
      - name: 🧪 Test Build Process
        run: |
          Write-Host "=== Testing Electron Build ==="
          npm run package
          Write-Host "✅ Package build successful"
        shell: pwsh
        
      - name: 📋 Validate Build Output
        run: |
          if (Test-Path "out") {
            Write-Host "✅ Build output directory exists"
            Get-ChildItem -Recurse out/ | Select-Object Name, Length, LastWriteTime | Format-Table
          } else {
            Write-Host "❌ Build output directory missing"
            exit 1
          }
        shell: pwsh

  # 🔍 Test Android Build
  test-android:
    name: 🔍 Test Android Build  
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: 📦 Install Dependencies
        run: npm ci
        
      - name: 🧪 Test Web Build
        run: |
          echo "=== Testing Web Assets Build ==="
          npm run build
          echo "✅ Web build successful"
          
      - name: 🧪 Test Capacitor Sync
        run: |
          echo "=== Testing Capacitor Sync ==="
          npm run cap:sync
          echo "✅ Capacitor sync successful"
          
      - name: 🧪 Test Android Gradle Build
        run: |
          echo "=== Testing Android Gradle Build ==="
          cd android
          ./gradlew assembleDebug
          echo "✅ Android debug build successful"
          
      - name: 📋 Validate Android Output
        run: |
          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ Android APK generated successfully"
            ls -la android/app/build/outputs/apk/debug/
          else
            echo "❌ Android APK not found"
            find android/app/build -name "*.apk" -type f || echo "No APK files found"
            exit 1
          fi

  # ✅ Test Summary
  test-summary:
    name: ✅ Test Summary
    needs: [test-windows, test-android]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: 📊 Test Results Summary
        run: |
          echo "# 🧪 Test Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.test-windows.result }}" == "success" ]; then
            echo "- ✅ **Windows Build**: Success" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **Windows Build**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.test-android.result }}" == "success" ]; then
            echo "- ✅ **Android Build**: Success" >> $GITHUB_STEP_SUMMARY  
          else
            echo "- ❌ **Android Build**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🚀 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "If all tests pass, you can:" >> $GITHUB_STEP_SUMMARY
          echo "1. Merge this PR" >> $GITHUB_STEP_SUMMARY  
          echo "2. Create a version tag to trigger release build" >> $GITHUB_STEP_SUMMARY
          echo "3. \`git tag v1.0.0 && git push origin v1.0.0\`" >> $GITHUB_STEP_SUMMARY
          
      - name: 🎯 Check Overall Status
        run: |
          if [ "${{ needs.test-windows.result }}" == "success" ] && [ "${{ needs.test-android.result }}" == "success" ]; then
            echo "🎉 All tests passed! Ready for release."
          else
            echo "❌ Some tests failed. Please check the logs."
            exit 1
          fi
